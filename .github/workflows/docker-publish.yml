name: Build and Publish Docker Image to GHCR

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
      - 'care-v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: care-ecosystem/superset

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Compute tags/labels once, share across arch jobs ──────────────────
  prepare:
    name: Prepare Metadata
    runs-on: ubuntu-24.04
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      short_sha: ${{ steps.vars.outputs.SHORT_SHA }}
      is_pr: ${{ github.event_name == 'pull_request' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=match,pattern=care-v(.*),group=1
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=${{ github.ref_name }}-${{ steps.vars.outputs.SHORT_SHA }}
            type=raw,value=${{ github.ref_name }}-${{ github.run_number }}-${{ steps.vars.outputs.SHORT_SHA }}
          labels: |
            org.opencontainers.image.title=CARE Superset
            org.opencontainers.image.description=Apache Superset customized for CARE HMIS platform
            org.opencontainers.image.vendor=eGov Foundation / CARE Team

  # ── Job 2: PR validation — amd64 only, no push ───────────────────────────────
  build-pr:
    name: Build PR (amd64 only)
    needs: prepare
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Free up disk space
        run: |
          echo "Disk before cleanup:"
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost || true
          echo "Disk after cleanup:"
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (load, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ needs.prepare.outputs.tags }}
          labels: ${{ needs.prepare.outputs.labels }}
          target: lean
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            BUILD_TRANSLATIONS=false
            INCLUDE_CHROMIUM=false

      - name: Print image details
        run: |
          echo "Image built successfully for PR validation"
          docker images | grep ${{ env.IMAGE_NAME }} || echo "No images found"

      - name: Test image health
        run: |
          docker run --rm \
            -e DATABASE_HOST=localhost \
            -e DATABASE_PORT=5432 \
            -e DATABASE_DB=superset \
            -e DATABASE_USER=superset \
            -e DATABASE_PASSWORD=superset \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.number }} \
            superset version

  # ── Job 3: Build per-arch images, push arch-suffixed staging tags ─────────────
  build-matrix:
    name: Build (${{ matrix.arch }})
    needs: prepare
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm  # Native arm64 — no QEMU

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Free up disk space
        run: |
          echo "Disk before cleanup:"
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost || true
          echo "Disk after cleanup:"
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-${{ matrix.arch }}-buildx-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-buildx-${{ github.ref_name }}-
            ${{ runner.os }}-${{ matrix.arch }}-buildx-

      - name: Build and push arch-specific image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ needs.prepare.outputs.short_sha }}-${{ matrix.arch }}
          labels: ${{ needs.prepare.outputs.labels }}
          target: lean
          cache-from: |
            type=local,src=/tmp/.buildx-cache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
          build-args: |
            BUILD_TRANSLATIONS=false
            INCLUDE_CHROMIUM=false

  # ── Job 4: Combine arch digests → multi-arch manifest for every final tag ────
  create-manifest:
    name: Create Multi-Arch Manifest
    needs: [prepare, build-matrix]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          STAGING_TAG="${{ github.ref_name }}-${{ needs.prepare.outputs.short_sha }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          echo "→ Resolving digests for ${IMAGE}:${STAGING_TAG}-amd64 / arm64"

          AMD64_DIGEST=$(docker buildx imagetools inspect \
            "${IMAGE}:${STAGING_TAG}-amd64" \
            --format '{{json .}}' \
            | jq -r '.manifest.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest')

          ARM64_DIGEST=$(docker buildx imagetools inspect \
            "${IMAGE}:${STAGING_TAG}-arm64" \
            --format '{{json .}}' \
            | jq -r '.manifest.manifests[] | select(.platform.architecture=="arm64" and .platform.os=="linux") | .digest')

          if [ -z "$AMD64_DIGEST" ] || [ -z "$ARM64_DIGEST" ]; then
            echo "❌ Failed to resolve digests — aborting"
            exit 1
          fi

          echo "   amd64: $AMD64_DIGEST"
          echo "   arm64: $ARM64_DIGEST"

          # Also update the registry buildcache tag for next run
          docker buildx imagetools create \
            --tag "${IMAGE}:buildcache" \
            "${IMAGE}@${AMD64_DIGEST}" \
            "${IMAGE}@${ARM64_DIGEST}"

          echo "${{ needs.prepare.outputs.tags }}" | while IFS= read -r FULL_TAG; do
            [ -z "$FULL_TAG" ] && continue

            docker buildx imagetools create \
              --tag "$FULL_TAG" \
              "${IMAGE}@${AMD64_DIGEST}" \
              "${IMAGE}@${ARM64_DIGEST}"

            echo "✅ Pushed manifest: $FULL_TAG"
          done

      - name: Generate build summary
        run: |
          echo "## Docker Image Published 🐳" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** \`linux/amd64\`, \`linux/arm64\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Run Number:** \`${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit SHA:** \`${{ needs.prepare.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.prepare.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
